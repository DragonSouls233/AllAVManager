# =============================================================================
# MDCX 高级档部署（多容器编排：app + postgres + redis + nginx）
#
# 适用场景：
#   - 中型团队、多用户并发
#   - 高性能需求、大规模媒体库
#   - 需要 TLS 终止、反向代理、缓存加速
#
# 架构：
#   nginx (80/443) --> mdcx-app (8420) --> postgres (5432)
#                                       --> redis (6379)
#
# 使用：
#   # 1. 准备 .env 文件（设置密码、域名等）
#   cp .env.example .env && vim .env
#   # 2. 启动
#   docker compose -f docker-compose.advanced.yml up -d
#   # 3. 查看日志
#   docker compose -f docker-compose.advanced.yml logs -f mdcx
#   # 4. 停止
#   docker compose -f docker-compose.advanced.yml down
#
# TLS 证书：
#   将证书放置于 ./deploy/nginx/certs/ 目录，命名为 fullchain.pem 和 privkey.pem
#   或使用 Let's Encrypt（配合 certbot/acme-companion）
# =============================================================================

services:
  # ---------- PostgreSQL 数据库 ----------
  postgres:
    image: postgres:16-alpine
    container_name: mdcx-postgres
    hostname: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mdcx}
      POSTGRES_USER: ${POSTGRES_USER:-mdcx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdcx_change_me_in_production}
      TZ: Asia/Shanghai
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data
      # 可选：自定义 PostgreSQL 配置
      # - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdcx} -d ${POSTGRES_DB:-mdcx}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # 不直接暴露端口（仅内部网络访问）
    networks:
      - mdcx-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: mdcx-redis
    hostname: redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-mdcx_redis_change_me}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mdcx_redis_change_me}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - mdcx-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------- MDCX 应用 ----------
  mdcx:
    image: mdcx:latest
    build:
      context: ..
      dockerfile: MDCX-Server/Dockerfile
      args:
        BUILD_FRONTEND: "true"

    container_name: mdcx-app
    hostname: mdcx-app
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      MDCX_DEPLOY_TIER: advanced
      MDCX_HOST: 0.0.0.0
      MDCX_PORT: 8420
      MDCX_LOG_LEVEL: ${MDCX_LOG_LEVEL:-info}
      MDCX_STATIC_DIR: /app/static
      MDCX_DATA_DIR: /app/data
      MDCX_OUTPUT_DIR: /media
      # PostgreSQL 连接
      MDCX_DB_HOST: postgres
      MDCX_DB_PORT: 5432
      MDCX_DB_NAME: ${POSTGRES_DB:-mdcx}
      MDCX_DB_USER: ${POSTGRES_USER:-mdcx}
      MDCX_DB_PASSWORD: ${POSTGRES_PASSWORD:-mdcx_change_me_in_production}
      MDCX_DB_POOL_SIZE: 20
      # Redis 连接
      MDCX_REDIS_URL: redis://:${REDIS_PASSWORD:-mdcx_redis_change_me}@redis:6379/0
      TZ: Asia/Shanghai
      LANG: C.UTF-8

    volumes:
      - mdcx-data:/app/data
      - ${MEDIA_DIR:-./media}:/media
      # 媒体源（可选只读挂载）
      # - /path/to/source:/source:ro

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8420/api/v1/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G

    networks:
      - mdcx-internal
      - mdcx-edge
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Nginx 反向代理 + TLS 终止 ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: mdcx-nginx
    hostname: mdcx-nginx
    restart: unless-stopped

    depends_on:
      mdcx:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - mdcx-edge
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres-data:
    driver: local
    name: mdcx-postgres-data
  redis-data:
    driver: local
    name: mdcx-redis-data
  mdcx-data:
    driver: local
    name: mdcx-app-data
  nginx-cache:
    driver: local
    name: mdcx-nginx-cache
  nginx-logs:
    driver: local
    name: mdcx-nginx-logs

networks:
  mdcx-internal:
    driver: bridge
    name: mdcx-internal
    internal: true  # 内部网络，不对外暴露
  mdcx-edge:
    driver: bridge
    name: mdcx-edge
