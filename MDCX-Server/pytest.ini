[pytest]
# 主配置在 pyproject.toml [tool.pytest.ini_options]
# 此文件仅为旧版 pytest(<6.0 无 pyproject 支持)和 IDE 兼容保留
pythonpath = .
testpaths = tests
addopts = -v --tb=short --strict-markers
asyncio_mode = auto
markers =
    unit: 纯单元测试,无 IO 副作用
    integration: 集成测试,使用 mock 不打真实站点
    smoke: 真实站点连通性检查(deselect with '-m "not smoke"')
    e2e: 端到端测试,需要真实文件系统
    slow: 慢测试(>1s)
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:passlib.*
