# =============================================================================
# MDCX Nginx 主配置（高级档/企业档反向代理）
#
# 功能：
#   - HTTP -> HTTPS 自动跳转
#   - TLS 终止（支持 HTTP/2）
#   - 静态资源缓存加速
#   - WebSocket 代理（实时日志流、HLS）
#   - 请求体大小提升（视频上传/刮削）
#   - 安全头（HSTS/X-Frame-Options 等）
#   - gzip 压缩
#   - 健康检查端点
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ---------- 基础配置 ----------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    server_tokens off;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ---------- 性能优化 ----------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;

    # 客户端请求体大小（允许上传大文件 / 视频刮削）
    client_max_body_size 4G;
    client_body_buffer_size 256k;
    client_body_timeout 300s;
    client_header_timeout 30s;
    send_timeout 300s;

    # 缓冲区
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 128k;

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-javascript
        application/x-font-ttf
        application/vnd.ms-fontobject
        image/svg+xml
        font/woff2;

    # ---------- WebSocket 支持映射 ----------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------- 上游 MDCX 应用 ----------
    upstream mdcx_backend {
        server mdcx-app:8420 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---------- 安全头 ----------
    # 在 server 块中通过 include /etc/nginx/security.conf 引入

    # ---------- HTTP -> HTTPS 跳转 ----------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 健康检查端点（不跳转，直接返回 200）
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ACME challenge（Let's Encrypt）
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        # 其余全部跳转到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------- HTTPS 主服务 ----------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ${MDCX_DOMAIN:-_};

        # TLS 证书（如不存在请用 HTTP 模式或自签证书）
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # TLS 优化
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # 安全头
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 根路径 -> MDCX 应用
        location / {
            proxy_pass http://mdcx_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时（视频流/刮削可能较慢）
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # WebSocket 路由（实时日志流）
        location ~ ^/(api/v1/logs/stream|api/v1/tasks/stream|ws/) {
            proxy_pass http://mdcx_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 长连接
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # HLS 视频流（支持 Range 请求）
        location ~ ^/(api/v1/movies/.+/(stream|hls)|stream/) {
            proxy_pass http://mdcx_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 视频流优化
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            # 支持 HTTP Range
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
        }

        # 静态资源缓存（前端 assets）
        location ~* ^/assets/.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            proxy_pass http://mdcx_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            # 强缓存 30 天
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 健康检查（内部）
        location = /healthz {
            access_log off;
            proxy_pass http://mdcx_backend/api/v1/health/live;
        }
    }
}
