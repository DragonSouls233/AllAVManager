# 默认配置文件
# 所有配置项均可通过环境变量覆盖
app_name: 龙魂视频管理系统

# ===== 5 模块配置 =====
modules:
  jav:
    enabled: true
    media_dirs:
      - G:\TEST\有码
  uncensored:
    enabled: true
    media_dirs:
      - G:\TEST\无码
  fc2:
    enabled: true
    media_dirs:
      - G:\TEST\FC2
  chinese:
    enabled: true
    media_dirs:
      - G:\TEST\国产
    actor_from_folder: true
    folder_depth: 1
    folder_pattern: []
    actor_blacklist:
      - 新建文件夹
      - 合集
      - 精选
      - unknown
      - 未分类
      - tmp
      - temp
      - downloads
    auto_create_actor: true
    studio_names_as_folder: false
  pornhub:
    enabled: true
    media_dirs:
      - G:\TEST\pornhub
  western:
    enabled: true
    media_dirs:
      - G:\TEST\欧美
  scanner:
    concurrent_limit: 5
    retry_count: 3

# ===== 下载管理配置 =====
downloader:
  output_dir: ./downloads
  max_concurrent: 3
  max_retries: 3
  retry_delay: 2
  default_format: best
  merge_output: true
  merge_format: mp4
  proxy: ""
  path_templates:
    jav: "downloads/jav/{actor}/{code}-{title}.{ext}"
    uncensored: "downloads/uncensored/{actor}/{code}-{title}.{ext}"
    fc2: "downloads/fc2/{code}-{title}.{ext}"
    chinese: "downloads/chinese/{actor}/下载视频/{title}.{ext}"
    pornhub: "downloads/pornhub/{actor}/{upload_date}-{title}.{ext}"
  post_process:
    scrape_after_download: true
    nfo_after_download: true
    move_to_media_dir: true

server:
  host: 0.0.0.0
  port: 8420
  workers: 1
  debug: false

database:
  url: sqlite+aiosqlite:///data/database/scraper.db
  pool_size: 5
  echo: false

scraper:
  media_dirs: []
  output_dir: ./output
  concurrent_limit: 5
  retry_count: 3
  timeout: 30
  language: zh

proxy:
  http: null
  socks5: null
  enabled: false

emby:
  url: null
  api_key: null
  enabled: false

jellyfin:
  url: null
  api_key: null
  enabled: false

translate:
  engine: google
  api_key: null
  api_base: null
  source_lang: ja
  target_lang: zh

webhook:
  telegram_token: null
  telegram_chat_id: null
  discord_url: null
  wechat_url: null
  enabled: false

# ===== 自动备份配置 =====
backup:
  enabled: true           # 默认开启（可关闭）
  interval: daily         # 备份频率：daily / weekly / hourly
  schedule_time: "03:00"  # 执行时间（HH:MM）
  schedule_day: 0         # 每周模式执行日（0=周日）
  max_backups: 7          # 最大保留备份数
  backup_database: true   # 备份数据库
  backup_config: true     # 备份配置文件
  backup_logs: false      # 备份日志文件
  compress: true          # 压缩备份为 .tar.gz
  backup_dir: ""          # 自定义备份目录（留空= data/backups）

log:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_enabled: true
  console_enabled: true
